  schemas:
    commandId:
      type: integer
      description: >
        Unique ID of the command request. Generated by the client and should be
        unique within a WS session.

        The simplest way to use it would be to start from 1 and then increment
        the value for every new command sent to the server.

        If the id is set to 0, the server treats it the same way as if there was
        no id.
      minimum: 0
    subscriptionId:
      type: integer
      description: >-
        Server-generated subscription identifier (sid) used to identify the
        channel
      minimum: 1
    sequenceNumber:
      type: integer
      description: >-
        Sequential number that should be checked if you want to guarantee you
        received all the messages. Used for snapshot/delta consistency
      minimum: 1
    marketTicker:
      type: string
      description: Unique market identifier
      pattern: ^[A-Z0-9-]+$
      examples:
        - FED-23DEC-T3.00
        - HIGHNY-22DEC23-B53.5
    marketId:
      type: string
      description: Unique market UUID
      format: uuid
    marketSide:
      type: string
      description: Market side
      enum:
        - 'yes'
        - 'no'
    orderAction:
      type: string
      description: Order action type
      enum:
        - buy
        - sell
    subscribeCommandPayload:
      type: object
      required:
        - id
        - cmd
        - params
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        cmd:
          type: string
          const: subscribe
        params:
          type: object
          required:
            - channels
          properties:
            channels:
              type: array
              description: List of channels to subscribe to
              items:
                type: string
                enum:
                  - orderbook_delta
                  - ticker
                  - trade
                  - fill
                  - market_positions
                  - market_lifecycle_v2
                  - multivariate_market_lifecycle
                  - multivariate
                  - communications
                  - order_group_updates
                  - user_orders
              minItems: 1
            market_ticker:
              description: >-
                Subscribe to a single market. Type: string. Example:
                "KXBTCD-25AUG0517-T114999.99" (mutually exclusive with
                market_tickers)
              type: string
            market_tickers:
              type: array
              description: >-
                Subscribe to multiple markets. Type: array of strings. Example:
                ["KXBTCD-25AUG0517-T114999.99", "KXETHD-25AUG0517-T3749.99"]
                (mutually exclusive with market_ticker)
              items:
                $ref: '#/components/schemas/marketTicker'
              minItems: 1
            market_id:
              type: string
              format: uuid
              description: >-
                Subscribe to a single market by UUID (ticker only; mutually
                exclusive with market_ids and market_ticker(s))
            market_ids:
              type: array
              description: >-
                Subscribe to multiple markets by UUID (ticker only; mutually
                exclusive with market_id and market_ticker(s))
              items:
                $ref: '#/components/schemas/marketId'
              minItems: 1
            send_initial_snapshot:
              type: boolean
              description: >-
                If true, receive an initial snapshot for requested market
                tickers on the ticker channel
              default: false
            skip_ticker_ack:
              type: boolean
              description: >-
                If true, OK responses omit the market_tickers/market_ids lists
                for this subscription
              default: false
            shard_factor:
              type: integer
              description: Number of shards for communications channel fanout (optional)
              minimum: 1
            shard_key:
              type: integer
              description: >-
                Shard key for communications channel fanout (requires
                shard_factor)
              minimum: 0
    unsubscribeCommandPayload:
      type: object
      required:
        - id
        - cmd
        - params
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        cmd:
          type: string
          const: unsubscribe
        params:
          type: object
          required:
            - sids
          properties:
            sids:
              type: array
              description: List of subscription IDs to cancel
              items:
                $ref: '#/components/schemas/subscriptionId'
              minItems: 1
    updateSubscriptionCommandPayload:
      type: object
      required:
        - id
        - cmd
        - params
      properties:
        id:
          $ref: '#/components/schemas/commandId'
        cmd:
          type: string
          const: update_subscription
        params:
          type: object
          required:
            - action
          properties:
            sid:
              $ref: '#/components/schemas/subscriptionId'
              description: Single subscription ID to update (alternative to sids array)
            sids:
              type: array
              description: >-
                Array containing exactly one subscription ID (alternative to
                sid). Either sid or sids must be provided, not both.
              items:
                $ref: '#/components/schemas/subscriptionId'
              minItems: 1
              maxItems: 1
            market_ticker:
              description: 'Add/remove a single market. Type: string'
              type: string
            market_tickers:
              type: array
              description: 'Add/remove multiple markets. Type: array of strings'
              items:
                $ref: '#/components/schemas/marketTicker'
            market_id:
              type: string
              format: uuid
              description: Add/remove a single market by UUID (ticker only)
            market_ids:
              type: array
              description: Add/remove multiple markets by UUID (ticker only)
              items:
                $ref: '#/components/schemas/marketId'
            send_initial_snapshot:
              type: boolean
              description: >-
                If true, receive an initial snapshot for newly added market
                tickers on the ticker channel
              default: false
            action:
              type: string
              enum:
                - add_markets
                - delete_markets
    subscribedResponsePayload:
