            rfq_creator_id:
              type: string
              description: Anonymized identifier for the RFQ creator
            order_id:
              type: string
              description: >-
                Your order ID resulting from the quote execution. Use this to
                match with fill messages
            client_order_id:
              type: string
              description: >-
                Your client order ID for the executed order. Use this to
                correlate with fill messages
            market_ticker:
              type: string
              description: Market ticker for the executed quote
